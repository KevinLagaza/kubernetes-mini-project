apiVersion: apps/v1
kind: Deployment
metadata:
  name: paymybuddy
  namespace: paymybuddy
  labels:
    app: paymybuddy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: paymybuddy
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: paymybuddy
    spec:
      imagePullSecrets:
      - name: dockerhub-secret
      containers:
      - name: paymybuddy
        image: kevinlagaza/paymybuddy:21
        imagePullPolicy: Always
        env:
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: mysql-user
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: mysql-password
        - name: SPRING_DATASOURCE_URL
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: spring-datasource-url
        ports:
        - containerPort: 8080
          name: http
        readinessProbe:
          httpGet:
            path: /login
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /login
            port: 8080
          initialDelaySeconds: 90
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        volumeMounts:
        - name: paymybuddy-data
          mountPath: /data
      volumes:
      - name: paymybuddy-data
        hostPath:
          path: /data
          type: DirectoryOrCreate